<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>REAL Shahnameh - Play</title><link rel="stylesheet" href="style.css"></head>
<body><main class="app">
  <section class="card gold-edge header">
    <div class="profile"><div class="avatar">RS</div><div><h1 class="title">Real Shahnameh</h1><div class="muted">Warrior Rank</div><div class="badges"><span class="badge">Season 2</span><span class="badge">Premium</span></div></div></div>
  </section>

  <section class="grid-2">
    <article class="card stat-card"><div class="stat-label">Balance</div><div class="stat-value">12,840 REAL</div></article>
    <article class="card stat-card"><div class="stat-label">Profit / hour</div><div class="stat-value">+172 REAL</div></article>
  </section>

  <section class="orb-wrap">
    <div class="energy-orb" data-energy-orb><div class="core-icon">REAL</div></div>
    <div class="energy-meta"><div class="energy-line"><span>Energy</span><span>72 / 100</span></div><div class="bar"><div class="fill"></div></div></div>
  </section>

  <section class="action-grid">
    <article class="card action gold-edge"><h4>Boost</h4><p class="muted">Multiply your tap power for 30 minutes.</p><button class="primary-btn">Activate Boost</button></article>
    <article class="card action"><h4>Invite</h4><p class="muted">Bring allies and earn REAL rewards.</p><button class="secondary-btn">Share Invite</button></article>
  </section>
</main>
