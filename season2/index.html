<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>REAL Shahnameh - Season 2</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- TOP BAR -->
    <header class="topbar">

      <div class="profile">
        <div class="avatar"></div>

        <div>
          <h3>SETai</h3>
          <p>King Level I</p>
        </div>
      </div>

      <div class="balance-box">
        <span>Total Balance</span>
        <h2>124,580</h2>
      </div>

    </header>

    <!-- ENERGY CORE -->
    <section class="hero-section">

      <div class="energy-ring">

        <div class="energy-core">

          <span class="tap-text">TAP TO MINE</span>

          <h1>+12</h1>

        </div>

      </div>

    </section>

    <!-- ACTIONS -->
    <section class="actions">

      <button class="gold-btn">
        ⚡ Boost
      </button>

      <button class="dark-btn">
        👥 Invite
      </button>

    </section>

    <!-- STATS -->
    <section class="stats">

      <div class="stat-card">
        <span>Profit / hour</span>
        <h3>+1,280</h3>
      </div>

      <div class="stat-card">
        <span>Referral Earnings</span>
        <h3>+8,420</h3>
      </div>

    </section>

    <!-- NAV -->
    <nav class="bottom-nav">

      <div class="nav-item active">
        ⚡
        <span>Play</span>
      </div>

      <div class="nav-item">
        👑
        <span>Heroes</span>
      </div>

      <div class="nav-item">
        📚
        <span>Learn</span>
      </div>

      <div class="nav-item">
        💰
        <span>Earn</span>
      </div>

    </nav>

  </div>

</body>
</html>
