<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAL Shahnameh - Season 2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="topbar">
  <div class="profile">
    <div class="avatar"></div>
    <div>
      <h3>SETai</h3>
      <p>King Level I</p>
    </div>
  </div>

  <div class="balance-box">
    <span>Total Balance</span>
    <h2>124,580</h2>
  </div>
</header>

<section class="hero-section">
  <div class="energy-ring">
    <button class="energy-core" onclick="spawnTap(event)">
      <span class="tap-text">TAP TO MINE</span>
      <h1>+12</h1>

  </div>
</section>

<section class="actions">
  <button class="gold-btn">⚡ Boost</button>
  <button class="dark-btn" onclick="location.href='earn.html'">👥 Invite</button>
</section>

<section class="stats">
  <div class="stat-card">
    <span>Profit / hour</span>
    <h3>+1,280</h3>
  </div>

  <div class="stat-card">
    <span>Referral Earnings</span>
    <h3>+8,420</h3>
  </div>
</section>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span>⚡</span>
    <small>Play</small>
  </a>

  <a href="heroes.html" class="nav-item">
    <span>👑</span>
    <small>Heroes</small>
  </a>

  <a href="learn.html" class="nav-item">
    <span>📚</span>
    <small>Learn</small>
  </a>

  <a href="earn.html" class="nav-item">
    <span>💰</span>
    <small>Earn</small>
  </a>
</nav>

</div>

<script src="app.js"></script>

</html>
