<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heroes - REAL Shahnameh</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="page-header">

<a href="index.html" class="back-btn">←</a>

<div>
<h1>Heroes</h1>
<p>Upgrade legendary warriors</p>
</div>

</header>

<section class="heroes-grid">

<div class="hero-card legendary">

<div class="hero-top">
<span class="rarity">LEGENDARY</span>
</div>

<h2>Rostam</h2>

<p>
Massive tap power boost and combat multiplier.
</p>

<div class="hero-stats">
<span>⚔️ +220%</span>
<span>⚡ +90%</span>
</div>

<button class="gold-btn full-btn">
Upgrade Hero
</button>

</div>

<div class="hero-card epic">

<div class="hero-top">
<span class="rarity">EPIC</span>
</div>

<h2>Tahmineh</h2>

<p>
Increases referral rewards and social bonuses.
</p>

<div class="hero-stats">
<span>👥 +140%</span>
<span>💰 +80%</span>
</div>

<button class="dark-btn full-btn">
Unlock
</button>

</div>

<div class="hero-card rare">

<div class="hero-top">
<span class="rarity">RARE</span>
</div>

<h2>Simorgh</h2>

<p>
Ancient guardian bird restoring energy over time.
</p>

<div class="hero-stats">
<span>🦅 +100%</span>
<span>❤️ +70%</span>
</div>

<button class="dark-btn full-btn">
Unlock
</button>

</div>

</section>

</div>

</html>
