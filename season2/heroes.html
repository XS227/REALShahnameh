<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#04050b" />
  <title>REAL Shahnameh — Collection</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=202605130010" />
  <link rel="stylesheet" href="heroes.css?v=202605130010" />
</head>
<body>
  <main class="app heroes-app">

    <!-- ── Header ─────────────────────────────────────── -->
    <section class="page-head" style="margin-bottom:2px;">
      <div>
        <h2 class="page-title">Discovery Album</h2>
        <p class="page-sub">Your unlocked collection from the Shahnameh</p>
      </div>
      <span class="pill">S2 · Ch.1</span>
    </section>

    <!-- ── Chapter 1 complete banner ─────────────────── -->
    <div class="chapter-banner">
      <div class="cb-check">✓</div>
      <div class="cb-body">
        <div class="cb-kicker">Chapter Complete</div>
        <div class="cb-title">Chapter 1 — The First King</div>
        <div class="cb-sub">10 items discovered · Keyumars era</div>
      </div>
      <img
        src="/assets/images/chapters/chapter-1-keyumars-cover.png"
        alt="Chapter 1"
        class="cb-thumb"
        onerror="this.outerHTML='<div class=\'cb-thumb-fallback\'>👑</div>'"
      >
    </div>

    <!-- ── Collection stats strip ────────────────────── -->
    <div class="coll-stats-strip">
      <div class="css-cell">
        <div class="css-val">10</div>
        <div class="css-lbl">Discovered</div>
      </div>
      <div class="css-cell">
        <div class="css-val">59</div>
        <div class="css-lbl">Locked</div>
      </div>
      <div class="css-cell">
        <div class="css-val">14.7%</div>
        <div class="css-lbl">Complete</div>
      </div>
      <div class="css-cell">
        <div class="css-val gold">Rare</div>
        <div class="css-lbl">Avg Rarity</div>
      </div>
    </div>

    <!-- ── Tab filters ───────────────────────────────── -->
    <div class="coll-tabs" id="coll-tabs">
      <button class="coll-tab active" data-filter="all">All</button>
      <button class="coll-tab" data-filter="character">Characters</button>
      <button class="coll-tab" data-filter="place">Places</button>
      <button class="coll-tab" data-filter="enemy">Enemies</button>
      <button class="coll-tab" data-filter="codex">Codex</button>
    </div>

    <!-- ── Collection grid (populated by heroes.js) ── -->
    <div class="coll-grid" id="coll-grid">
      <!-- cards injected by heroes.js -->
    </div>

  </main>

  <!-- ── Bottom nav (Heroes active) ───────────────── -->
  <nav class="bottom-nav">
    <a class="nav-item" href="index.html">
      <span class="ni-ico">🏠</span><span data-i18n="home">Home</span>
    </a>
    <a class="nav-item" href="tap.html">
      <span class="ni-ico">⚡</span><span data-i18n="tap">Tap</span>
    </a>
    <a class="nav-item active" href="heroes.html">
      <span class="ni-ico">⚔</span><span data-i18n="heroes">Heroes</span>
    </a>
    <a class="nav-item" href="learn.html">
      <span class="ni-ico">📜</span><span data-i18n="learn">Learn</span>
    </a>
    <a class="nav-item" href="earn.html">
      <span class="ni-ico">💎</span><span data-i18n="earn">Earn</span>
    </a>
    <a class="nav-item" href="social.html">
      <span class="ni-ico">👥</span><span data-i18n="social">Social</span>
    </a>
  </nav>

  <!-- ── Certificate of Discovery modal ──────────── -->
  <div class="cert-backdrop" id="cert-backdrop" role="dialog" aria-modal="true" aria-label="Certificate of Discovery">
    <div class="cert-modal" id="cert-modal">
      <!-- populated by heroes.js openCertificate() -->
    </div>
  </div>

  <div class="toast" data-toast></div>

  <script src="app.js?v=202605130010"></script>
  <script src="heroes.js?v=202605130010"></script>
</body>
</html>
